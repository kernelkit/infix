# netd sample configuration
# See CONFIGURATION.md for detailed documentation

[routes]
# Static routes
ip route 10.0.0.0/24 192.168.1.1 1
ipv6 route 2001:db8::/32 fe80::1 1

[rip]
# RIP configuration (requires FRR)
network eth0
redistribute connected
redistribute static
timers update 30 invalid 180 flush 240

